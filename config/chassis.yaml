ackermann_chassis_driver:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    serial_baud: 230400

    # 车体参数
    wheelbase: 0.148               # m
    max_steering_angle_deg: 45.0   # deg

    # 发布频率
    odom_frame: "odom"
    base_frame: "base_link"
    publish_tf: true
    odom_publish_hz: 50.0

    # 安全
    cmd_timeout_sec: 0.5           # 超过则急停
    max_linear_speed: 0.6          # m/s（再由几何约束限制w）
    max_angular_speed: 3.0         # rad/s（再由几何约束限制w）

    # 里程计积分（没有轮编码器/IMU也能先跑）
    use_reported_twist_from_board: false
